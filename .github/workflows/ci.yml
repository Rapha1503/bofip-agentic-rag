name: CI

on:
  push:
    branches: ["master", "main", "rapha1503/**"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m compileall app.py scripts src tests

      - name: Unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Setup script smoke test
        run: python scripts/check_setup.py --tracked-only --deep --skip-models
