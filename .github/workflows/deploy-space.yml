name: Deploy Hugging Face Space

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Space payload
        run: |
          mkdir -p /tmp/space
          cp -R app.py Dockerfile requirements.txt pyproject.toml src docs /tmp/space/
          cp space/README.md /tmp/space/README.md

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: rapha1503/bofip-agentic-rag
        run: |
          test -n "$HF_TOKEN"
          python -m pip install --upgrade huggingface_hub
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          HfApi().upload_folder(
              folder_path="/tmp/space",
              repo_id=os.environ["HF_SPACE_REPO"],
              repo_type="space",
              token=os.environ["HF_TOKEN"],
              commit_message="deploy space runtime",
          )
          PY
